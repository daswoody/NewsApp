# Compose file for Coolify deployments: no host port binding, Coolify's
# proxy routes the domain directly to the app container (port 3000).
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://newsapp:${POSTGRES_PASSWORD}@db:5432/newsapp
      # must match the domain assigned in Coolify, e.g. https://news.example.com
      ORIGIN: ${ORIGIN}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      IMAGE_DIR: /app/data/images
      BODY_SIZE_LIMIT: 5M
    volumes:
      - images:/app/data/images
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsapp
      POSTGRES_USER: newsapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U newsapp -d newsapp']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  images:
